<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Grillade le gout</title>
    <!-- Tailwind CSS v3 + Font Awesome Icons + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/alertify.min.css">
    <style>
        * {
            scroll-margin-top: 80px; /* smooth anchor offset for sticky header */
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background-color: #f9fafb;
        }
        .bg-primary {
            background-color: #ff6b1a;
        }
        .text-primary {
            color: #ff6b1a;
        }
        .border-primary {
            border-color: #ff6b1a;
        }
        .hover\:bg-primary-dark:hover {
            background-color: #5a2390;
        }
        .ring-primary {
            --tw-ring-color: #ff6b1a;
        }
        /* Sticky category bar shadow */
        .sticky-nav {
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        /* hide scrollbar but keep functionality on category nav */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* product card transition */
        .product-card {
            transition: all 0.2s ease;
        }
        .product-card:hover {
            border-color: #e2e8f0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        /* increment/decrement buttons */
        .cart-qty-btn {
            transition: 0.1s linear;
        }
        .cart-sidebar {
            max-height: calc(100vh - 140px);
            overflow-y: auto;
        }
        .cart-backdrop {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .cart-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }
        @media (max-width: 1023px) {
            .cart-sidebar {
                max-height: none;
                overflow: visible;
            }
            body.home-dashboard-cart-bottom #cartIconMobile {
                display: none;
            }
            body.home-dashboard-cart-bottom #cartMobileBottom {
                display: block;
            }
            .cart-sidebar-panel {
                position: fixed;
                left: 50%;
                top: 50%;
                z-index: 60;
                width: calc(100vw - 2rem);
                max-height: none;
                transform: translate(-50%, -50%) scale(0.96);
                opacity: 0;
                pointer-events: none;
                transition: transform 0.3s ease, opacity 0.3s ease;
            }
            .cart-sidebar-panel.open {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
                pointer-events: auto;
            }
        }
    </style>
</head>
<body class="antialiased {% block body_class %}{% endblock %}">

    <!-- HEADER (simple clone style) -->
    <header class="bg-white shadow-sm sticky top-0 z-30 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between flex-wrap">
            <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-1">
                    <a href="/" class="text-2xl font-bold text-primary">Grillade le gout</a>
                    <span class="text-xs bg-gray-100 px-1.5 py-0.5 rounded-full text-gray-600">MA</span>
                </div>
                <div class="hidden md:flex items-center text-sm text-gray-500 bg-gray-50 px-3 py-1.5 rounded-full">
                    <i class="fas fa-map-marker-alt text-primary mr-1 text-xs"></i> Kenitra
                </div>
            </div>
            <div class="flex items-center space-x-5">
                <i class="far fa-user text-gray-500 text-xl"></i>
                <!-- cart icon mobile trigger + desktop badge (dynamic) -->
                <div class="relative cursor-pointer" id="cartIconMobile">
                    <i class="fas fa-shopping-bag text-gray-600 text-xl"></i>
                    <span id="globalCartCount" class="absolute -top-2 -right-2 bg-primary text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="flex flex-col lg:flex-row gap-8">
            {% block content %}{% endblock %}
            <!-- MAIN CONTENT (left) -->
            
        </div>
    </main>
    <script src="/static/js/alertify.min.js"></script>
    <script>
        

        // Cart state: { name, price, quantity, img, desc }
        // load guest cart from localStorage if present
        let cart = JSON.parse(localStorage.getItem('guest_cart') || '[]');
        function saveCart() {
            if (cart.length === 0) {
                localStorage.removeItem('guest_cart');
                return;
            }
            try { localStorage.setItem('guest_cart', JSON.stringify(cart)); } catch(e){} 
        }

        // Helper render cart
        function updateCartUI() {
            const container = $("#cartItemsContainer");
            if (cart.length === 0) {
                container.html(`<div class="text-center text-gray-400 py-8 text-sm">✨ les produits apparaîtront ici.</div>`);
            } else {
                let html = '';
                cart.forEach((item, idx) => {
                    const itemHtml = `
                        <div class="flex justify-between items-start border-b pb-2" data-idx="${idx}">
                            <div class="flex-1"><span class="font-medium">${item.name}</span><div class="text-xs text-gray-500">${item.desc.substring(0, 50)}</div><div class="font-bold text-primary text-sm">${item.price.toFixed(2)} MAD</div></div>
                            <div class="flex items-center space-x-2">
                                <button class="cart-qty-btn decr bg-gray-100 w-7 h-7 rounded-full text-gray-700">−</button>
                                <span class="w-6 text-center">${item.quantity}</span>
                                <button class="cart-qty-btn incr bg-gray-100 w-7 h-7 rounded-full text-gray-700">+</button>
                            </div>
                        </div>`;
                    html += itemHtml;
                });
                container.html(html);

                // Attach events for desktop increment/decrement
                container.find(".incr").each(function() {
                    const parentDiv = $(this).closest("[data-idx]");
                    const idx = parentDiv.attr("data-idx");
                    $(this).off("click").on("click", () => modifyCartItem(parseInt(idx), 1));
                });
                container.find(".decr").each(function() {
                    const parentDiv = $(this).closest("[data-idx]");
                    const idx = parentDiv.attr("data-idx");
                    $(this).off("click").on("click", () => modifyCartItem(parseInt(idx), -1));
                });
            }
            // Update totals and badge
            const subtotal = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            const delivery = 12;
            const total = subtotal + delivery;
            $("#cartSubtotal").text(`${subtotal.toFixed(2)} MAD`);
            $("#cartTotal").text(`${total.toFixed(2)} MAD`);
            const itemCount = cart.reduce((acc, i) => acc + i.quantity, 0);
            $("#globalCartCount").text(itemCount);
            $("#globalCartCountBottom").text(itemCount);
            // persist guest cart whenever UI updates
            saveCart();
        }

        function modifyCartItem(index, delta) {
            if (!cart[index]) return;
            const newQty = cart[index].quantity + delta;
            if (newQty <= 0) {
                cart.splice(index, 1);
            } else {
                cart[index].quantity = newQty;
            }
            updateCartUI();
        }

        function addToCart(product) {
            const existing = cart.findIndex(item => item.name === product.name && item.price === product.price);
            if (existing !== -1) {
                cart[existing].quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
            // small bounce animation on cart icon
            $("#globalCartCount").addClass("scale-110");
            setTimeout(() => $("#globalCartCount").removeClass("scale-110"), 200);
        }

        // server-rendered buttons include data-item-id attribute; handle those clicks to add to guest cart (and allow import on checkout)
        $(document).on('click', '.add-to-cart-btn', function(e) {
            const id = $(this).data('item-id');
            if (typeof id !== 'undefined' && id !== false) {
                e.preventDefault();
                const prod = {
                    name: $(this).data('name'),
                    price: parseFloat($(this).data('price')) || 0,
                    desc: $(this).data('desc') || '',
                    id: id
                };
                addToCart(prod);
            }
        });

        // Render product grid generator
        function renderProductGrid(containerId, itemsArray, isTopSeller = false) {
            let html = '';
            itemsArray.forEach(p => {
                html += `
                    <div class="product-card bg-white rounded-xl border border-gray-100 p-3 flex justify-between items-center transition">
                        <div class="flex-1">
                            <div class="flex items-center gap-1">
                                ${isTopSeller ? '<span class="bg-yellow-200 text-yellow-800 text-[10px] font-bold px-1.5 rounded-full">🔥 Top</span>' : ''}
                                <h3 class="font-bold text-gray-800">${p.name}</h3>
                            </div>
                            <p class="text-gray-500 text-xs mt-1">${p.desc}</p>
                            <div class="font-bold text-primary mt-1">${p.price.toFixed(2)} MAD</div>
                        </div>
                        <button class="add-to-cart-btn bg-primary text-white w-9 h-9 rounded-full flex items-center justify-center shadow-md hover:bg-primary-dark transition">
                            <i class="fas fa-plus text-sm"></i>
                        </button>
                    </div>
                `;
            });
            $(`#${containerId}`).html(html);
            // bind add to cart for each button inside this grid
            $(`#${containerId} .add-to-cart-btn`).each(function(idx) {
                const productData = itemsArray[idx];
                $(this).off("click").on("click", (e) => {
                    e.preventDefault();
                    addToCart(productData);
                });
            });
        }

        // populate all sections
        // renderProductGrid("topSellersList", menu.topSellers, true);
        // renderProductGrid("sandwichNormalGrid", menu.sandwichNormal);
        // renderProductGrid("sandwichLargeGrid", menu.sandwichLarge);
        // renderProductGrid("tacosGrid", menu.tacos);
        // renderProductGrid("bowlsGrid", menu.bowls);
        // renderProductGrid("burgersGrid", menu.burgers);
        // renderProductGrid("platsGrid", menu.plats);
        // renderProductGrid("pouletGrid", menu.poulet);
        // renderProductGrid("supplementsGrid", menu.supplements);
        // renderProductGrid("boissonsGrid", menu.boissons);

        // Sticky category active highlight + smooth scroll
        $(".category-link").on("click", function(e) {
            e.preventDefault();
            const target = $(this).attr("href");
            if (target && $(target).length) {
                $("html, body").animate({
                    scrollTop: $(target).offset().top - 85
                }, 300);
            }
            $(".category-link").removeClass("text-primary border-primary").addClass("text-gray-500 border-transparent");
            $(this).addClass("text-primary border-primary").removeClass("text-gray-500 border-transparent");
        });

        const cartSidebar = $("#cartSidebar");
        const cartBackdrop = $("#cartBackdrop");

        function openCartSidebar() {
            cartSidebar.addClass("open");
            cartBackdrop.addClass("open");
            document.body.style.overflow = "hidden";
            if (window.matchMedia("(max-width: 1023px)").matches) {
                cartSidebar.attr("style", [
                    "position: fixed",
                    "left: 50%",
                    "top: 50%",
                    "width: min(calc(100vw - 2rem), 26rem)",
                    "max-height: none",
                    "transform: translate(-50%, -50%) scale(1)",
                    "opacity: 1",
                    "pointer-events: auto",
                    "z-index: 60"
                ].join("; "));
            }
        }

        function closeCartSidebar() {
            cartSidebar.removeClass("open");
            cartBackdrop.removeClass("open");
            document.body.style.overflow = "";
            cartSidebar.removeAttr("style");
        }

        $("#cartIconMobile").on("click", () => {
            if (window.matchMedia("(max-width: 1023px)").matches) {
                openCartSidebar();
            }
        });
        $("#cartIconBottom").on("click", () => {
            if (window.matchMedia("(max-width: 1023px)").matches) {
                openCartSidebar();
            }
        });
        $("#closeCartDrawer, #cartBackdrop").on("click", closeCartSidebar);
        
        // Checkout helper and action
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        $(document).on('click', '#goToCheckout', function(e){
            e.preventDefault();
            if (cart.length === 0) {
                // alert('La commande est vide. Veuillez ajouter des articles avant de passer à la caisse.');
                return;
            }
            const isAuth = {{ user.is_authenticated|yesno:'true,false' }};
            if (isAuth) {
                fetch("{% url 'api_cart_import' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify(cart)
                }).then(r => {
                    if (r.ok) {
                        return r.json();
                    }
                    // if server returns non-OK (403/500), still navigate to checkout so user can try
                    window.location.href = "{% url 'checkout' %}";
                    throw new Error('server-error');
                }).then(data => {
                    if (data && data.success) {
                        window.location.href = "{% url 'checkout' %}";
                    } else {
                        // fallback: navigate to checkout anyway
                        window.location.href = "{% url 'checkout' %}";
                    }
                }).catch((err) => {
                    console.warn('Cart import failed:', err);
                    window.location.href = "{% url 'checkout' %}";
                });
            } else {
                saveCart();
                window.location.href = "{% url 'guest_checkout' %}";
            }
        });

        // On DOM ready, load guest_cart and render it
        $(function(){
            try{
                const saved = localStorage.getItem('guest_cart');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length) {
                        cart = parsed;
                    }
                }
            }catch(e){ console.warn('Failed loading guest_cart', e); }
            updateCartUI();
        });
    </script>
    {% block js %}{% endblock %}
</body>
</html>
